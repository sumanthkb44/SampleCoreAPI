name: License Clearance

on:
  push:
    branches: [ master ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build & Restore
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Debug – list generated files after dotnet restore
        run: |
          echo ">>> Repo root:"
          pwd
          ls -la
      
          echo ">>> Searching for project.assets.json"
          find . -name project.assets.json -type f
      
          echo ">>> Searching for obj directories"
          find . -type d -name obj

  clearing:
    name: Continuous Clearing
    needs: build
    uses: sumanthkb44/.github/.github/workflows/continuous-clearing.yml@main
